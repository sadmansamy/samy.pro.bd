<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP App Dashboard</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-color: #2d3748;
            --border-radius: 16px;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        /* App Grid Layout */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
        }

        /* Clickable App Card Box */
        .app-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 20px 15px;
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.7);
            transition: var(--transition);
            aspect-ratio: 1 / 1; /* Makes the boxes perfectly square */
        }

        .app-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(49, 130, 206, 0.12);
            border-color: rgba(49, 130, 206, 0.3);
            background: #ffffff;
        }

        /* Uniform Icon/Logo Container */
        .app-icon {
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .app-icon img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* App Title */
        .app-name {
            font-size: 0.9rem;
            font-weight: 600;
            margin: 0;
            line-height: 1.3;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="app-grid">
        
        <!-- App 1: Bangla Call / AmarIP -->
        <a href="https://amarip.net/" target="_blank" class="app-card">
            <div class="app-icon">
                <img src="https://samy.pro.bd/p/img/sip_sarker.jpeg" alt="Sarker Communication">
            </div>
            <p class="app-name">Bangla Call</p>
        </a>

        <!-- App 2: iTalk -->
        <a href="https://sip.italk.com.bd/iconiptsp/" target="_blank" class="app-card">
            <div class="app-icon">
                <img src="https://samy.pro.bd/p/img/sip_icon.jpg" alt="iTalk">
            </div>
            <p class="app-name">Icon Infotech</p>
        </a>

        <!-- App 3: ICC -->
        <a href="https://icctalk.com/icc" target="_blank" class="app-card">
            <div class="app-icon">
                <img src="https://samy.pro.bd/p/img/sip_icc.jpeg" alt="ICC">
            </div>
            <p class="app-name">ICC Talk</p>
        </a>

        <!-- App 4: WebVoice -->
        <a href="http://webvoice.net/" target="_blank" class="app-card">
            <div class="app-icon">
                <img src="https://samy.pro.bd/p/img/sip_weblink.png" alt="WebVoice">
            </div>
            <p class="app-name">Weblink</p>
        </a>

        <!-- App 5: Premium Connectivity -->
        <a href="https://iptsp.pmcon.net/portal/login" target="_blank" class="app-card">
            <div class="app-icon">
                <img src="https://samy.pro.bd/p/img/sip_premium.jpeg" alt="Premium Connectivity">
            </div>
            <p class="app-name">Premium Portal</p>
        </a>

    </div>
</div>

</body>
</html>
