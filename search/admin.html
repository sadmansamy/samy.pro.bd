<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Admin Panel</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            --primary: #238636;
            --primary-hover: #2ea043;
            --error: #f85149;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .admin-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; width: 100%; max-width: 440px; padding: 24px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3); }
        .header { margin-bottom: 24px; text-align: center; }
        .header h3 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; }
        .header p { color: var(--text-muted); font-size: 0.875rem; }
        .input-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
        input[type="text"], input[type="password"] { background-color: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-color); padding: 12px 14px; font-size: 1rem; border-radius: 6px; width: 100%; -webkit-appearance: none; }
        input:focus { outline: none; border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15); }
        .btn { background-color: var(--primary); color: white; border: 1px solid rgba(240, 246, 252, 0.1); padding: 14px; font-size: 1rem; font-weight: 600; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 8px; transition: background-color 0.2s; }
        .btn:hover { background-color: var(--primary-hover); }
        .status-msg { margin-top: 16px; padding: 10px; border-radius: 6px; font-size: 0.875rem; text-align: center; display: none; }
        .status-msg.error { display: block; background-color: rgba(248, 81, 73, 0.1); border: 1px solid var(--error); color: var(--error); }
        .status-msg.success { display: block; background-color: rgba(46, 160, 67, 0.1); border: 1px solid var(--primary-hover); color: #56d364; }
    </style>
</head>
<body>

    <div class="admin-card">
        <div class="header">
            <h3>Search Admin Panel</h3>
            <p>Token-Free Automated Sync</p>
        </div>

        <div class="input-group">
            <label>Website Title</label>
            <input type="text" id="title" placeholder="e.g., My Portal">
        </div>

        <div class="input-group">
            <label>Website URL</label>
            <input type="text" id="url" placeholder="e.g., https://samy.pro.bd">
        </div>

        <div class="input-group">
            <label>Logo URL</label>
            <input type="text" id="logo" placeholder="e.g., https://example.com/logo.png">
        </div>

        <div class="input-group">
            <label>Admin Password</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>

        <button class="btn" onclick="submitData()">Save and Sync Changes</button>
        <div id="status" class="status-msg"></div>
    </div>

    <script>
        const STORED_HASH = "34c3af7fecf199a685fddce33a803fc8e3830fe1c2c5584b3aa38f436e2cce45";

        function showStatus(text, type) {
            const statusEl = document.getElementById('status');
            statusEl.innerText = text;
            statusEl.className = `status-msg ${type}`;
        }

        async function submitData() {
            const inputPass = document.getElementById('pass').value;
            if (!inputPass) {
                showStatus("Please enter your password.", "error");
                return;
            }
            
            const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(inputPass));
            const hex = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');

            if (hex !== STORED_HASH) {
                showStatus("Authentication Failed: Wrong Password!", "error");
                return;
            }

            const dataPayload = {
                title: document.getElementById('title').value,
                url: document.getElementById('url').value,
                logo: document.getElementById('logo').value
            };

            showStatus("Opening GitHub to auto-confirm...", "success");

            // Encode the data safely into a GitHub Issue URL parameters
            const titleParam = encodeURIComponent("Admin Data Update Request");
            const bodyParam = encodeURIComponent(JSON.stringify(dataPayload, null, 2));
            const labelsParam = encodeURIComponent("admin-update");

            // Redirects to GitHub's issue creation page with everything auto-filled
            setTimeout(() => {
                window.location.href = `https://github.com/sadmansamy16/23Feb2026/issues/new?title=${titleParam}&body=${bodyParam}&labels=${labelsParam}`;
            }, 1000);
        }
    </script>
</body>
</html>
