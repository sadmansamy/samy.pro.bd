<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samy Search</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --text-main: #1d1d1f;
            --accent-color: #0071e3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 40px 16px; min-height: 100vh;
        }

        .workspace { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 28px; }

        /* CLEAN SHORTCUTS: NO HOVER, NO ANIMATION, NO BACKGROUND */
        .shortcuts-grid { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        
        .shortcut-item {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: var(--text-main);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: none !important;
            background: transparent !important;
        }

        .icon-container {
            width: 52px; height: 52px;
            border-radius: 14px;
            overflow: hidden; /* This crops the image to the square shape */
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 8px;
            background: transparent; /* No background color */
        }

        .icon-container img {
            width: 100%; height: 100%;
            object-fit: cover; /* Forces the image to fill the entire square */
            display: block;
        }

        .icon-plus {
            width: 100%; height: 100%;
            background: #e8e8ed;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; color: #86868b;
        }

        .shortcut-title { font-size: 11px; font-weight: 500; text-align: center; width: 100%; }

        /* MODAL STYLES */
        .modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; padding: 20px; z-index: 1000; }
        .modal-card { background: white; padding: 24px; border-radius: 20px; width: 100%; max-width: 300px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 12px; background: var(--accent-color); color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="workspace">
    <div class="shortcuts-grid" id="localShortcutsGrid"></div>
</div>

<div class="modal-overlay" id="addLinkModal">
    <div class="modal-card">
        <h3>Add Shortcut</h3>
        <input type="text" id="newTitle" placeholder="Name">
        <input type="text" id="newUrl" placeholder="URL">
        <input type="file" id="fileInput" accept="image/*">
        <button onclick="addShortcut()">Add</button>
        <button onclick="toggleModal(false)" style="background:#ddd; color:black; margin-top:10px;">Cancel</button>
    </div>
</div>

<script>
    let localShortcuts = JSON.parse(localStorage.getItem('samy_local_shortcuts') || '[]');
    let db = null;

    const request = indexedDB.open("SamySearchDB", 1);
    request.onupgradeneeded = e => e.target.result.createObjectStore("images", { keyPath: "id" });
    request.onsuccess = e => { db = e.target.result; render(); };

    function render() {
        const grid = document.getElementById('localShortcutsGrid');
        grid.innerHTML = '';
        
        localShortcuts.forEach((item, index) => {
            const div = document.createElement('a');
            div.className = 'shortcut-item';
            div.href = item.url;
            div.innerHTML = `
                <div class="icon-container" id="icon-${index}"></div>
                <div class="shortcut-title">${item.name}</div>
            `;
            grid.appendChild(div);

            const tx = db.transaction("images").objectStore("images").get(item.img);
            tx.onsuccess = () => {
                if (tx.result) document.getElementById(`icon-${index}`).innerHTML = `<img src="${tx.result.data}">`;
            };
        });

        grid.innerHTML += `<div class="shortcut-item" onclick="toggleModal(true)">
            <div class="icon-container"><div class="icon-plus">+</div></div>
            <div class="shortcut-title">Add</div>
        </div>`;
    }

    function addShortcut() {
        const name = document.getElementById('newTitle').value;
        const url = document.getElementById('newUrl').value;
        const file = document.getElementById('fileInput').files[0];
        const id = 'db_' + Date.now();

        const reader = new FileReader();
        reader.onload = e => {
            db.transaction("images", "readwrite").objectStore("images").put({ id, data: e.target.result });
            localShortcuts.push({ name, url, img: id });
            localStorage.setItem('samy_local_shortcuts', JSON.stringify(localShortcuts));
            render();
            toggleModal(false);
        };
        reader.readAsDataURL(file);
    }

    function toggleModal(show) { document.getElementById('addLinkModal').style.display = show ? 'flex' : 'none'; }
</script>
</body>
</html>
