<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta name="theme-color" content="#0b57d0">
    <title>samy.pro.bd</title>
    <style>
        :root { 
            --bg: #f0f4f9; 
            --bubble-bg: #ffffff; 
            --text: #000000; 
            --subtext: #1a1c1e;
            --link: #0b57d0; 
        }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            padding: 24px; 
            opacity: 0; 
            transition: opacity 0.4s ease-out; 
        }
        .container { 
            width: 100%; 
            max-width: 480px; 
            margin-top: 8vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .error-code {
            font-size: 7.5rem;
            font-weight: 900;
            line-height: 1;
            margin: 0;
            letter-spacing: -2px;
        }
        .error-message {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--subtext);
            margin: 24px 0 48px 0;
        }

        /* Merged Search Bar Styles from Home */
        .input-wrapper { 
            background: var(--bubble-bg); 
            border-radius: 30px; 
            padding: 6px 16px 6px 24px; 
            display: flex; 
            align-items: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); 
            margin-bottom: 32px; 
            border: 2px solid var(--link); 
            width: 100%;
            box-sizing: border-box;
        }
        .prefix { 
            color: #717171; 
            font-weight: 600; 
            font-size: 1.05rem;
            white-space: nowrap; 
            user-select: none; 
        }
        #shortcut-input { 
            border: none; 
            outline: none; 
            padding: 14px 4px; 
            font-size: 1.05rem; 
            font-weight: 600; 
            width: 100%; 
            background: transparent; 
            color: #717171; 
        }
        .go-btn { 
            background: var(--link); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 20px; 
            font-weight: 800; 
            cursor: pointer; 
            display: none; 
            margin-left: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="error-code">404</h1>
    <div class="error-message">Sorry, page not found.</div>
    
    <div class="input-wrapper">
        <span class="prefix">samy.pro.bd/</span>
        <input type="text" id="shortcut-input" placeholder="......" autocomplete="off" autocapitalize="none" spellcheck="false" inputmode="url">
        <button id="go-button" class="go-btn">Go</button>
    </div>
</div>

<script>
    const rawPath = window.location.pathname;
    const pathSegments = rawPath.split('/').filter(p => p); 
    const urlRegex = /(https?:\/\/[^\s]+)/g;

    // Search Box References
    const inputField = document.getElementById('shortcut-input');
    const goButton = document.getElementById('go-button');

    function doRedirect() {
        const val = inputField.value.trim().toLowerCase();
        if (val) window.location.href = '/' + val;
    }

    // Search Event Listeners
    inputField.addEventListener('input', () => {
        goButton.style.display = inputField.value.trim() ? 'block' : 'none';
    });
    inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') doRedirect(); });
    goButton.addEventListener('click', doRedirect);

    async function init() {
        // 1. GLOBAL TRAILING SLASH REMOVAL
        if (rawPath.endsWith('/') && rawPath.length > 1) {
            const cleanPath = rawPath.slice(0, -1);
            const searchParams = window.location.search; 
            const hashParams = window.location.hash;     
            window.location.replace(cleanPath + searchParams + hashParams);
            return;
        }

        // 2. Pass through routing rule for 2FA profiles
        if (pathSegments.length > 0 && pathSegments[0].toLowerCase() === '2fa') {
            const secret = pathSegments.slice(1).join('/');
            const hash = window.location.hash;
            window.location.replace("https://2fa.samy.pro.bd/" + secret + hash);
            return;
        }

        // 3. Root Redirect Mapping from redirect.json
        try {
            const primarySegment = pathSegments[0].toLowerCase();
            const res = await fetch('/redirect.json');
            const redirects = await res.json();
            
            if (redirects[primarySegment]) { 
                window.location.replace(redirects[primarySegment]); 
                return; 
            }
        } catch (err) { 
            // Fall through to show the static 404 display below
        }

        // Show the 404 block and input elements if all routing lookups miss
        document.body.style.opacity = "1";
    }

    init();
</script>
</body>
</html>
