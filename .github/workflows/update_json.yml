name: Update JSON
on:
  repository_dispatch:
    types: [update-data]

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update file
        run: |
          echo '${{ github.event.client_payload.data }}' > search/new_web.json
        env:
          GITHUB_TOKEN: ${{ secrets.MY_TOKEN }}

      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Admin Update: Website Info"
          file_pattern: search/new_web.json
